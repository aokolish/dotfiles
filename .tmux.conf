set -g prefix C-a
unbind C-b

set -sg escape-time 1

set -g base-index 1
setw -g pane-base-index 1

# shortcut to reload configuration
bind r source-file ~/.tmux.conf \; display 'Reloaded!'
#bind C-a send-prefix

set -g prefix C-s
unbind C-b
bind C-s send-prefix

# opening split panes
bind - split-window -v
bind v split-window -h

# move to previous pane
bind-key h previous-window

# moving from split to split
# bind h select-pane -L #don't care about this for now
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# enable mouse use
# setw -g mode-mouse on
set -g mouse on
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# make scrolling with wheels work
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelUpPane if-shell -F "#{pane_in_mode}" "send-keys -M" "copy-mode -e; send-keys -M"

# colors
set -g default-terminal 'screen-256color'

set-option -g history-limit 3000

set -g renumber-windows on
setw -g automatic-rename on

set -g status on

# dracula theme
set -g @plugin 'dracula/tmux'
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-plugins "time"
set -g status-interval 5

# notify me if something happens in another window
# setw -g monitor-activity on
# set -g visual-activity on

# bell when a background window goes quiet (e.g. agent finished)
set -g monitor-silence 30
set -g visual-silence off
set -g silence-action other

# vim mode movement
setw -g mode-keys vi

#bind C-c run "tmux save-buffer - | reattach-to-user-namespace pbcopy"
#bind C-v run "tmux set-buffer $(reattach-to-user-namespace pbpaste); tmux paste-buffer"

# does not work, damn....
bind C-l send-keys -R \; clear-history

# prevent bash_profile from being sourced again by using a login shell
#set -g default-command "reattach-to-user-namespace -l /bin/zsh"

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

run -b '~/.tmux/plugins/tpm/tpm'
